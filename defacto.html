<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог DeFacto</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
       <header>
    <a href="index.html" class="home-button">
        <img src="home-logo.png" alt="DOM OPT PMR">
    </a>
    <div id="manufacturers">
        </div>
    <div class="header-actions">
        <a href="cart.html" class="cart-button">
            🛒 Корзина <span id="cart-count">0</span>
        </a>
    </div>
</header>
    </header>

    <nav id="manufacturers">
        <a href="defacto.html"><img src="DeFacto.png" alt="DeFacto"></a>
        <a href="cart.html" class="cart-link">Корзина</a> 
    </nav>

    <section id="selectors">
        <div class="filter-group">
            <label for="main-select">Раздел:</label>
            <select id="main-select"></select>
        </div>
        <div class="filter-group">
            <label for="sub-select">Категория:</label>
            <select id="sub-select"></select>
        </div>
    </section>

    <div id="product-list"></div>

    <div id="modal" class="hidden">
        <span id="modal-close">&times;</span>
        <img id="modal-img" src="" alt="">
    </div>

    <script src="script.js"></script>
    <script>
    // Загружаем обновленный JSON
    fetch('DeFacto.json')
      .then(r => r.json())
      .then(products => {
         console.log('Данные загружены:', products.length, 'товаров');
         
         // ВАЖНО: Если категории пустые, значит в script.js 
         // нужно проверить, что функции используют поле "category", а не "category_ru"
         try {
            if (typeof buildStructure === "function") {
                currentStructure = buildStructure(products);
                populateMainSelect();
                // Первичная отрисовка всех товаров (если есть такая функция)
                if (typeof renderProducts === "function") {
                    renderProducts(products);
                }
            }
         } catch(err) {
            console.error('Ошибка инициализации каталога:', err);
         }
      })
      .catch(e => console.error('Ошибка загрузки DeFacto.json:', e));
    </script>
</body>
</html>
